name: Android APK Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          echo "android.sdk.path=$ANDROID_SDK_ROOT" >> local.properties

      - name: Build debug APK
        run: |
          chmod +x gradlew
          java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --stacktrace --info --console=plain

      - name: Fail if build did not produce APK
        run: |
          if [ ! -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK not generated"
            exit 1
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
